services:
  backend:
    build:
      context: ../..
      dockerfile: deploy/common/Dockerfile
    container_name: official-backend-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      GUNICORN_RELOAD: "true"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      PGSQL_HOST: postgres
      PGSQL_PORT: 5432
      PGSQL_DB: ustbhome
      PGSQL_USER: postgres
      PGSQL_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_ROOT: /data/file-data
    working_dir: /app
    command: gunicorn --config gunicorn.conf.py wsgi:app
    volumes:
      - ../../:/app
      - ../../file-data:/data/file-data
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: deploy/common/Dockerfile
    container_name: official-backend-worker
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      PGSQL_HOST: postgres
      PGSQL_PORT: 5432
      PGSQL_DB: ustbhome
      PGSQL_USER: postgres
      PGSQL_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      REDIS_URL: redis://redis:6379/0
      FILE_STORAGE_ROOT: /data/file-data
    working_dir: /app
    command: python worker.py
    volumes:
      - ../../:/app
      - ../../file-data:/data/file-data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: official-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ustbhome
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ustbhome"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: official-backend-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: official-backend-caddy
    restart: unless-stopped
    profiles: ["https"]
    env_file:
      - ./.env
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ../../file-data:/data/file-data:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: