x-backend-build: &backend-build
  context: "${BACKEND_BUILD_CONTEXT:-../..}"
  dockerfile: deploy/common/Dockerfile

# 唯一后端开发链路：挂载当前仓库源码到 /app，
# backend 通过 GUNICORN_RELOAD=true 在容器内完成热重载。

x-host-paths:
  file-data-rw: &file-data-rw "${FILE_DATA_HOST_PATH:-../../file-data}:/data/file-data"
  file-data-ro: &file-data-ro "${FILE_DATA_HOST_PATH:-../../file-data}:/data/file-data:ro"

x-app-env: &app-env
  TZ: ${APP_TIMEZONE:-Asia/Shanghai}
  STRICT_ENV: ${STRICT_ENV:-false}
  PGSQL_HOST: postgres
  PGSQL_PORT: 5432
  PGSQL_DB: ustbhome
  PGSQL_USER: postgres
  PGSQL_PASSWORD: ${PGSQL_PASSWORD:-postgres}
  REDIS_URL: redis://redis:6379/0
  FILE_STORAGE_ROOT: /data/file-data

services:
  backend:
    build: *backend-build
    container_name: official-backend-dev-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *app-env
      GUNICORN_RELOAD: "true"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
    working_dir: /app
    command: gunicorn --config gunicorn.conf.py wsgi:app
    volumes:
      - ../../:/app
      - *file-data-rw
    ports:
      - "127.0.0.1:5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: *backend-build
    container_name: official-backend-dev-worker
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *app-env
    working_dir: /app
    command: python worker.py
    volumes:
      - ../../:/app
      - *file-data-rw
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: official-backend-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ustbhome
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${PGSQL_PASSWORD:-postgres}
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ustbhome"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: official-backend-dev-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: official-backend-dev-caddy
    restart: unless-stopped
    profiles: ["https"]
    # 仅在需要同域 HTTPS 联调时启用；默认后端开发不依赖该服务。
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      APP_SITE_HOST: ${APP_SITE_HOST}
      API_SITE_HOST: ${API_SITE_HOST}
      MCA_BASE_URL: ${MCA_BASE_URL}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:5000}
      DEV_FRONTEND_UPSTREAM: ${DEV_FRONTEND_UPSTREAM:-http://host.docker.internal:5175}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MCA_STORAGE_ROOT:-/dev/null}:/data/mca:ro
      - *file-data-ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config: