x-backend-build: &backend-build
  context: "${BACKEND_BUILD_CONTEXT:-../..}"
  dockerfile: deploy/common/Dockerfile

x-host-paths:
  # ../../file-data means: from deploy/prod/ go back to repo root, then enter file-data/
  file-data-rw: &file-data-rw "${FILE_DATA_HOST_PATH:-../../file-data}:/data/file-data"
  file-data-ro: &file-data-ro "${FILE_DATA_HOST_PATH:-../../file-data}:/data/file-data:ro"

x-app-env: &app-env
  TZ: ${APP_TIMEZONE:-Asia/Shanghai}
  STRICT_ENV: ${STRICT_ENV:-true}
  PGSQL_HOST: postgres
  PGSQL_PORT: 5432
  PGSQL_DB: ustbhome
  PGSQL_USER: postgres
  REDIS_URL: redis://redis:6379/0
  FILE_STORAGE_ROOT: /data/file-data

services:
  secrets-init:
    build: *backend-build
    container_name: official-backend-secrets-init
    restart: "no"
    environment:
      SECRET_KEY: ${SECRET_KEY:-}
      FILE_DOWNLOAD_TOKEN_SECRET: ${FILE_DOWNLOAD_TOKEN_SECRET:-}
      PGSQL_PASSWORD: ${PGSQL_PASSWORD:-}
    working_dir: /app
    command: python deploy/prod/scripts/ensure_runtime_secrets.py
    volumes:
      - runtime_secrets:/run-secrets

  frontend:
    build:
      context: "${FRONTEND_BUILD_CONTEXT:-https://github.com/USTB-SkyCode/USTB-Official-Website.git#main}"
      dockerfile: Dockerfile
    container_name: official-frontend
    restart: unless-stopped

  backend:
    build: *backend-build
    container_name: official-backend-app
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *app-env
      GUNICORN_RELOAD: "false"
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
    working_dir: /app
    command: /bin/sh -lc ". /run-secrets/runtime-secrets.env; export SECRET_KEY FILE_DOWNLOAD_TOKEN_SECRET PGSQL_PASSWORD; exec gunicorn --config gunicorn.conf.py wsgi:app"
    volumes:
      - runtime_secrets:/run-secrets
      - *file-data-rw
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/healthz', timeout=5).read()"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: *backend-build
    container_name: official-backend-worker
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      <<: *app-env
    working_dir: /app
    command: /bin/sh -lc ". /run-secrets/runtime-secrets.env; export SECRET_KEY FILE_DOWNLOAD_TOKEN_SECRET PGSQL_PASSWORD; exec python worker.py"
    volumes:
      - runtime_secrets:/run-secrets
      - *file-data-rw
    depends_on:
      secrets-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: official-backend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ustbhome
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run-secrets/PGSQL_PASSWORD
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    volumes:
      - runtime_secrets:/run-secrets
      - postgres_data:/var/lib/postgresql/data
    depends_on:
      secrets-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ustbhome"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: official-backend-redis
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2
    container_name: official-backend-caddy
    restart: unless-stopped
    environment:
      TZ: ${APP_TIMEZONE:-Asia/Shanghai}
      APP_SITE_HOST: ${APP_SITE_HOST}
      API_SITE_HOST: ${API_SITE_HOST}
      MCA_BASE_URL: ${MCA_BASE_URL}
      FRONTEND_UPSTREAM: ${FRONTEND_UPSTREAM:-http://frontend:80}
      BACKEND_UPSTREAM: ${BACKEND_UPSTREAM:-http://backend:5000}
    #    For manual ingress testing, keep host ports disabled here and use
    #    docker-compose.traefik-lab.yml with the traefik-lab profile instead.
#    ports:
#      - "80:80"
#      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ${MCA_STORAGE_ROOT}:/data/mca:ro
      - *file-data-ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  runtime_secrets:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
